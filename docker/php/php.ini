; ── App settings ──────────────────────────────────────────────────────────────
upload_max_filesize = 50M
post_max_size = 50M
max_execution_time = 300
max_input_vars = 5000
memory_limit = 256M
default_charset = UTF-8
date.timezone = UTC
expose_php = Off

; ── Error display (production: off) ──────────────────────────────────────────
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /dev/stderr
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
