[www]
user = www-data
group = www-data

listen = 127.0.0.1:9000

; Pass all environment variables from the host process into PHP workers.
; Required so Railway-injected env vars (APP_KEY, DB_*, etc.) reach Laravel.
clear_env = no

; Dynamic process management
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500

; Logging
php_admin_value[error_log] = /dev/stderr
php_admin_flag[log_errors] = on
catch_workers_output = yes
decorate_workers_output = no
