[www]
user = www-data
group = www-data

listen = 127.0.0.1:9000

; Pass all environment variables from the host process into PHP workers.
; Required so Railway/Fly.io-injected env vars (APP_KEY, DB_*, etc.) reach Laravel.
clear_env = no

; Tuned for 256MB RAM (Fly.io free tier)
; Budget: opcache=64MB + nginx=10MB + 3 workers x 30MB = ~154MB total
pm = dynamic
pm.max_children = 5
pm.start_servers = 1
pm.min_spare_servers = 1
pm.max_spare_servers = 3
pm.max_requests = 200

; Logging
php_admin_value[error_log] = /dev/stderr
php_admin_flag[log_errors] = on
catch_workers_output = yes
decorate_workers_output = no
