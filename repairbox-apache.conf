<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/repair-box/public

    <Directory /var/www/repair-box/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Proxy WhatsApp Node.js service (port 3001) — internal only
    ProxyPreserveHost On
    ProxyPass        /wa-node http://127.0.0.1:3001
    ProxyPassReverse /wa-node http://127.0.0.1:3001

    ErrorLog ${APACHE_LOG_DIR}/repairbox-error.log
    CustomLog ${APACHE_LOG_DIR}/repairbox-access.log combined
</VirtualHost>
