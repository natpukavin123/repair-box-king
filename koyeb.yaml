# koyeb.yaml — Koyeb deployment config for RepairBox
# Free tier: 512MB RAM, 0.1 vCPU, always-on, no credit card needed
# Docs: https://www.koyeb.com/docs

name: repair-box

services:
  - name: web
    type: web
    instance_type: free          # Free tier instance
    regions:
      - sin                      # Singapore (closest to Asia)

    # Build from Dockerfile
    git:
      url: https://github.com/natpukavin123/repair-box-king
      branch: master

    # Koyeb sets PORT automatically — our start.sh already reads $PORT
    ports:
      - port: 8000
        protocol: http

    health_checks:
      - path: /up
        port: 8000
        protocol: http
        initial_delay: 30
        period: 30
        timeout: 10

    # Set these as secrets in Koyeb dashboard instead of here
    # koyeb.yaml env vars are public — use dashboard for secrets
    env:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: stderr
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
